<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Whales</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a1628; overflow: hidden; }
canvas { display: block; }
#ui {
  position: absolute; top: 20px; left: 22px;
  color: rgba(140,195,230,0.48);
  font: 11px/1.5 'Helvetica Neue', sans-serif;
  letter-spacing: 0.12em; pointer-events: none; user-select: none;
}
</style>

<body>
<div id="ui">THE WHALES &nbsp;&middot;&nbsp; drag to orbit</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

// ─── Utility functions ────────────────────────────────────────────────────────

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function angleDiff(from, to) {
  let d = to - from;
  while (d >  Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}

function lerpAngle(a, b, t) { return a + angleDiff(a, b) * clamp(t, 0, 1); }

function lerp(a, b, t) { return a + (b - a) * t; }

// ─── WhaleGeometry ────────────────────────────────────────────────────────────

class WhaleGeometry {
  constructor() {
    this.group    = new THREE.Group();
    this.bodyMesh = null;
    this.flukeMesh = null;
    this._origPos = null;
    this._N = 0;  // spine count
    this._V = 0;  // verts per ring (R+1)
    this._buildBodyGeo();
    this._buildDorsal();
    this._buildPec(1);
    this._buildPec(-1);
    this._buildFluke();
  }

  _buildBodyGeo() {
    const SPINE = [
      [ 10.0,  0.55, 0.50 ],
      [  9.0,  1.22, 1.08 ],
      [  7.5,  2.12, 1.88 ],
      [  5.5,  3.02, 2.64 ],
      [  3.0,  3.66, 3.22 ],
      [  0.5,  3.86, 3.42 ],
      [ -2.0,  3.60, 3.12 ],
      [ -4.5,  2.98, 2.56 ],
      [ -6.5,  2.14, 1.76 ],
      [ -8.0,  1.22, 0.96 ],
      [ -9.2,  0.58, 0.44 ],
      [-10.0,  0.18, 0.14 ],
    ];
    const R  = 18; // radial segments
    const N  = SPINE.length;
    this._N  = N;
    this._V  = R + 1;

    const totalVerts = N * (R + 1);
    const pos    = new Float32Array(totalVerts * 3);
    const colors = new Float32Array(totalVerts * 3);

    for (let i = 0; i < N; i++) {
      const [z, rx, ry] = SPINE[i];
      for (let j = 0; j <= R; j++) {
        const theta = (j / R) * Math.PI * 2;
        const x = rx * Math.cos(theta);
        const y = ry * Math.sin(theta);
        const idx = i * (R + 1) + j;
        pos[idx * 3 + 0] = x;
        pos[idx * 3 + 1] = y;
        pos[idx * 3 + 2] = z;

        // vertex color: belly vs back
        const bellyFactor = clamp(-Math.sin(theta), 0, 1);
        const r = lerp(0.13, 0.40, bellyFactor);
        const g = lerp(0.24, 0.49, bellyFactor);
        const b = lerp(0.38, 0.58, bellyFactor);
        colors[idx * 3 + 0] = r;
        colors[idx * 3 + 1] = g;
        colors[idx * 3 + 2] = b;
      }
    }

    // build indices
    const indices = [];
    for (let i = 0; i < N - 1; i++) {
      for (let j = 0; j < R; j++) {
        const a = i * (R + 1) + j;
        const b = a + 1;
        const c = (i + 1) * (R + 1) + j;
        const d = c + 1;
        indices.push(a, c, b);
        indices.push(b, c, d);
      }
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
    geo.setIndex(indices);
    geo.computeVertexNormals();

    this._origPos = Float32Array.from(pos);

    const mat = new THREE.MeshPhongMaterial({
      vertexColors: true,
      shininess: 55,
      specular: new THREE.Color(0x304060),
    });
    this.bodyMesh = new THREE.Mesh(geo, mat);
    this.group.add(this.bodyMesh);
  }

  _buildDorsal() {
    const verts = [
      [ 0.00, 0.00, -0.4],  // 0 front-base
      [ 0.00, 0.00, -3.6],  // 1 rear-base
      [ 0.16, 1.80, -2.9],  // 2 mid-right
      [-0.16, 1.80, -2.9],  // 3 mid-left
      [ 0.00, 3.40, -1.6],  // 4 tip
    ];
    const tris = [[0,4,2],[2,4,3],[0,2,1],[0,3,4],[1,2,3]];
    const geo  = this._buildManualGeo(verts, tris);
    const mat  = new THREE.MeshPhongMaterial({
      color: 0x1b3a5e,
      side: THREE.DoubleSide,
      shininess: 40,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(0, 3.12, 0);
    this.group.add(mesh);
  }

  _buildPec(sign) {
    const baseVerts = [
      [ 3.5, -0.7,  3.8],  // 0
      [ 3.5, -1.0,  1.6],  // 1
      [ 5.5, -1.3,  2.8],  // 2
      [ 8.2, -1.9,  1.4],  // 3
      [ 9.0, -0.9,  0.2],  // 4
      [ 7.0, -1.4,  3.6],  // 5
    ];
    const verts = baseVerts.map(([x, y, z]) => [x * sign, y, z]);
    const tris  = [[0,2,1],[0,5,2],[2,5,3],[3,5,4]];
    const geo   = this._buildManualGeo(verts, tris);
    const mat   = new THREE.MeshPhongMaterial({
      color: 0x1b3a5e,
      side: THREE.DoubleSide,
      shininess: 40,
    });
    const mesh  = new THREE.Mesh(geo, mat);
    this.group.add(mesh);
  }

  _buildFluke() {
    // Right lobe (sign=+1)
    const rightVerts = [
      [0.0, 0, 0.0],   // 0 center
      [1.8, 0, 0.6],   // 1
      [3.8, 0, 0.9],   // 2
      [5.6, 0, 0.4],   // 3
      [6.8, 0,-0.5],   // 4
      [5.8, 0,-1.8],   // 5
      [4.0, 0,-1.3],   // 6
      [1.8, 0,-0.5],   // 7
    ];
    const rightTris = [[0,1,2],[0,2,3],[0,3,4],[0,4,5],[0,5,6],[0,6,7]];

    // Left lobe: negate x, reverse winding (swap b,c)
    const leftVerts = rightVerts.map(([x, y, z]) => [-x, y, z]);
    const leftTris  = rightTris.map(([a, b, c]) => [a + rightVerts.length, c + rightVerts.length, b + rightVerts.length]);

    const allVerts = [...rightVerts, ...leftVerts];
    const allTris  = [...rightTris, ...leftTris];

    const geo = this._buildManualGeo(allVerts, allTris);
    const mat = new THREE.MeshPhongMaterial({
      color: 0x1b3a5e,
      side: THREE.DoubleSide,
      shininess: 40,
    });
    this.flukeMesh = new THREE.Mesh(geo, mat);
    this.flukeMesh.position.set(0, 0, -10);
    this.group.add(this.flukeMesh);
  }

  _buildManualGeo(verts, tris) {
    const pos = new Float32Array(verts.length * 3);
    verts.forEach(([x, y, z], i) => {
      pos[i * 3 + 0] = x;
      pos[i * 3 + 1] = y;
      pos[i * 3 + 2] = z;
    });
    const idx = [];
    tris.forEach(([a, b, c]) => idx.push(a, b, c));
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    return geo;
  }
}

// ─── WhaleAnimator ────────────────────────────────────────────────────────────

class WhaleAnimator {
  constructor(wGeo) {
    this._g        = wGeo;
    this._tPhase   = Math.random() * Math.PI * 2;
    this._maxAmp   = 2.2;
    this._freq     = 0.85;
    this._tailDisp = 0;
  }

  update(dt) {
    this._tPhase += dt * this._freq * Math.PI * 2;
    this._deformBody();
    this._animateFluke();
  }

  _deformBody() {
    const geo  = this._g.bodyMesh.geometry;
    const arr  = geo.attributes.position.array;
    const orig = this._g._origPos;
    const N    = this._g._N;
    const V    = this._g._V; // verts per ring

    for (let i = 0; i < N; i++) {
      const s      = i / (N - 1);
      const amp    = this._maxAmp * Math.pow(s, 2.2);
      const phOff  = -s * Math.PI * 3.2;
      const disp   = amp * Math.sin(this._tPhase + phOff);

      if (i === N - 1) this._tailDisp = disp;

      for (let j = 0; j < V; j++) {
        const idx = i * V + j;
        arr[idx * 3 + 1] = orig[idx * 3 + 1] + disp;
      }
    }

    geo.attributes.position.needsUpdate = true;
    geo.computeVertexNormals();
  }

  _animateFluke() {
    const s     = 1.0;
    const phOff = -Math.PI * 3.2;
    const vel   = this._maxAmp * Math.pow(s, 2.2) *
                  Math.cos(this._tPhase + phOff) *
                  this._freq * Math.PI * 2;

    const fluke = this._g.flukeMesh;
    fluke.position.y  = this._tailDisp;
    fluke.rotation.x  = clamp(-vel * 0.055, -0.30, 0.30);
  }
}

// ─── WhaleAgent ───────────────────────────────────────────────────────────────

class WhaleAgent {
  constructor() {
    this.position   = new THREE.Vector3(
      (Math.random() - 0.5) * 160,
      lerp(-55, -25, Math.random()),
      (Math.random() - 0.5) * 160
    );
    this.quaternion = new THREE.Quaternion();
    this.speed      = 8.0;
    this._yaw       = (Math.random() - 0.5) * Math.PI * 2;
    this._pitch     = 0;
    this._roll      = 0;
    this._applyQ();
    this.waypoint   = this._nextWP();
  }

  _nextWP() {
    return new THREE.Vector3(
      (Math.random() - 0.5) * 364,
      clamp(this.position.y + (Math.random() - 0.5) * 48, -76, -12),
      (Math.random() - 0.5) * 364
    );
  }

  _applyQ() {
    this.quaternion.setFromEuler(
      new THREE.Euler(this._pitch, this._yaw, this._roll, 'YXZ')
    );
  }

  getForward() {
    return new THREE.Vector3(0, 0, 1).applyQuaternion(this.quaternion);
  }

  getYaw() { return this._yaw; }

  update(dt) {
    const toWP = new THREE.Vector3().subVectors(this.waypoint, this.position);
    if (toWP.length() < 22) {
      this.waypoint = this._nextWP();
      toWP.subVectors(this.waypoint, this.position);
    }

    const dir   = toWP.clone().normalize();
    const hDist = Math.sqrt(dir.x * dir.x + dir.z * dir.z);

    const tYaw   = Math.atan2(dir.x, dir.z);
    const tPitch = clamp(Math.atan2(dir.y, hDist) * 0.85, -0.44, 0.44);

    const prevYaw = this._yaw;
    this._yaw     = lerpAngle(this._yaw, tYaw, 0.02);
    this._pitch   = lerp(this._pitch, tPitch, 0.015);

    const yawRate = angleDiff(prevYaw, this._yaw) / Math.max(dt, 0.001);
    this._roll    = lerp(this._roll, clamp(-yawRate * 0.55, -0.60, 0.60), 0.05);

    this._applyQ();

    const fwd = this.getForward();
    this.position.addScaledVector(fwd, this.speed * dt);

    this.position.x = clamp(this.position.x, -200, 200);
    this.position.y = clamp(this.position.y,  -80,  -8);
    this.position.z = clamp(this.position.z, -200, 200);
  }
}

// ─── WhaleRenderer ────────────────────────────────────────────────────────────

class WhaleRenderer {
  constructor() {
    this._renderer = new THREE.WebGLRenderer({ antialias: true });
    this._renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this._renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(this._renderer.domElement);

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x0a1628);
    this.scene.fog = new THREE.FogExp2(0x0a1628, 0.0062);

    this.camera = new THREE.PerspectiveCamera(
      58,
      window.innerWidth / window.innerHeight,
      0.5,
      1800
    );

    this._orbitYaw   = 0;
    this._orbitPitch = 0;
    this._camPos     = new THREE.Vector3();
    this._firstFrame = true;

    this._setupLights();
    this._setupEnvironment();
    this._setupOrbit();

    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this._renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  _setupLights() {
    const ambient = new THREE.AmbientLight(0x0d2040, 2.4);
    this.scene.add(ambient);

    const sun = new THREE.DirectionalLight(0x80b0d8, 1.6);
    sun.position.set(40, 100, 60);
    this.scene.add(sun);

    const fill = new THREE.DirectionalLight(0x162e50, 0.65);
    fill.position.set(-60, -20, -40);
    this.scene.add(fill);
  }

  _setupEnvironment() {
    const waterGeo = new THREE.PlaneGeometry(1400, 1400);
    const waterMat = new THREE.MeshPhongMaterial({
      color:       0x1a4e72,
      transparent: true,
      opacity:     0.30,
      shininess:   90,
      specular:    new THREE.Color(0x5aafe0),
      side:        THREE.DoubleSide,
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    water.position.y = 0;
    this.scene.add(water);
  }

  _setupOrbit() {
    const canvas = this._renderer.domElement;
    let dragging  = false;
    let lastX = 0, lastY = 0;

    canvas.addEventListener('mousedown', (e) => {
      dragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });
    window.addEventListener('mouseup',   () => { dragging = false; });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      this._orbitYaw   += dx * 0.006;
      this._orbitPitch  = clamp(this._orbitPitch - dy * 0.005, -0.45, 1.1);
    });

    // Touch support
    let touchX = 0, touchY = 0;
    canvas.addEventListener('touchstart', (e) => {
      touchX = e.touches[0].clientX;
      touchY = e.touches[0].clientY;
    });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const dx = e.touches[0].clientX - touchX;
      const dy = e.touches[0].clientY - touchY;
      touchX = e.touches[0].clientX;
      touchY = e.touches[0].clientY;
      this._orbitYaw   += dx * 0.006;
      this._orbitPitch  = clamp(this._orbitPitch - dy * 0.005, -0.45, 1.1);
    }, { passive: false });
  }

  add(obj) { this.scene.add(obj); }

  updateCamera(whalePos, whaleYaw, dt) {
    const dist  = 44;
    const elev  = 0.30 + this._orbitPitch;
    const azim  = whaleYaw + Math.PI + this._orbitYaw;

    const target = new THREE.Vector3(
      whalePos.x + Math.cos(elev) * Math.sin(azim) * dist,
      whalePos.y + Math.sin(elev) * dist,
      whalePos.z + Math.cos(elev) * Math.cos(azim) * dist
    );

    if (this._firstFrame) {
      this._camPos.copy(target);
      this._firstFrame = false;
    } else {
      this._camPos.lerp(target, 1 - Math.pow(0.95, dt * 60));
    }

    this.camera.position.copy(this._camPos);
    this.camera.lookAt(whalePos);
  }

  render() {
    this._renderer.render(this.scene, this.camera);
  }
}

// ─── Main loop ────────────────────────────────────────────────────────────────

const wr    = new WhaleRenderer();
const wGeo  = new WhaleGeometry();
const wAnim = new WhaleAnimator(wGeo);
const agent = new WhaleAgent();
wr.add(wGeo.group);

let lastT = null;
(function loop(ts) {
  requestAnimationFrame(loop);
  const t  = ts * 0.001;
  const dt = lastT == null ? 0.016 : Math.min(t - lastT, 0.05);
  lastT = t;
  agent.update(dt);
  wAnim.update(dt);
  wGeo.group.position.copy(agent.position);
  wGeo.group.quaternion.copy(agent.quaternion);
  wr.updateCamera(agent.position, agent.getYaw(), dt);
  wr.render();
})(0);

</script>
</body>
